<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CAPE Packager</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="cape-packager.css?v=20260523-cape-packager" />
    <script src="cape-vendor/jszip.min.js"></script>
  </head>
  <body>
    <main class="packager-shell">
      <header class="topbar">
        <img src="cape-assets/cape-wordmark.png" alt="CAPE" />
        <span>Packager</span>
      </header>

      <section class="workbench">
        <div class="dropzone" id="dropzone">
          <input id="zipInput" type="file" accept=".zip,application/zip" multiple hidden />
          <button type="button" id="pickButton">ZIPを選択</button>
          <p id="dropText">MotionPNGTuber ZIP → .cape</p>
        </div>

        <section class="queue" aria-label="変換結果">
          <div class="queue-head">
            <h1>CAPE Package</h1>
            <button type="button" id="clearButton" class="ghost">Clear</button>
          </div>
          <div id="resultList" class="result-list"></div>
          <div id="emptyState" class="empty-state">変換待ち</div>
        </section>
      </section>

      <aside class="spec-panel">
        <dl>
          <div>
            <dt>Format</dt>
            <dd>CAPE v1</dd>
          </div>
          <div>
            <dt>Input</dt>
            <dd>.zip</dd>
          </div>
          <div>
            <dt>Output</dt>
            <dd>.cape</dd>
          </div>
        </dl>
      </aside>
    </main>

    <script src="cape-packager.js?v=20260523-cape-packager"></script>
  </body>
</html>
